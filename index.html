<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>3D Ring Gallery</title>

</head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

.stage,
.ring,
.img{
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    user-select:none;
}

.stage{
    position:relative;
}

.container{
    position:absolute;

    width:300px;
    height:400px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);
    perspective:2000px;
}

.ring{
    position:absolute;
    inset:0;
}

.img{
    position:absolute;
    inset:0;

    border-radius:16px;
    overflow:hidden;

    background-size:cover;
    background-repeat:no-repeat;
}

</style>

<body>

    <main class="stage">

        <div class="container">
            <div class="ring">

                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>
                <div class="img"></div>

            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>

    <script>

let xPos = 0;

gsap.timeline()

.set(".ring", {
    rotationY:180,
    cursor:"grab"
})

.set(".img",{

    rotateY:(i)=>i*-36,

    transformOrigin:"50% 50% 500px",

    z:-500,

    backgroundImage:(i)=>
        `url(https://picsum.photos/id/${i+32}/600/400)`,

    backgroundPosition:(i)=>getBgPos(i),

    backfaceVisibility:"hidden"

})

.from(".img",{

    duration:1.5,

    y:200,

    opacity:0,

    stagger:0.1,

    ease:"expo"

})

.add(()=>{

    $(".img").on("mouseenter",(e)=>{

        const current=e.currentTarget;

        gsap.to(".img",{

            opacity:(i,t)=>t===current?1:0.5,

            ease:"power3"

        });

    });

    $(".img").on("mouseleave",()=>{

        gsap.to(".img",{

            opacity:1,

            ease:"power2.inOut"

        });

    });

}, "-=0.5");

$(window).on("mousedown touchstart", dragStart);
$(window).on("mouseup touchend", dragEnd);

function dragStart(e){

    if(e.touches){
        e.clientX=e.touches[0].clientX;
    }

    xPos=Math.round(e.clientX);

    gsap.set(".ring",{
        cursor:"grabbing"
    });

    $(window).on("mousemove touchmove",drag);

}

function drag(e){

    if(e.touches){
        e.clientX=e.touches[0].clientX;
    }

    gsap.to(".ring",{

        rotationY:`-=${(Math.round(e.clientX)-xPos)%360}`,

        onUpdate:()=>{

            gsap.set(".img",{

                backgroundPosition:(i)=>getBgPos(i)

            });

        }

    });

    xPos=Math.round(e.clientX);

}

function dragEnd(){

    $(window).off("mousemove touchmove",drag);

    gsap.set(".ring",{

        cursor:"grab"

    });

}

function getBgPos(i){

    return (

        100 -

        gsap.utils.wrap(

            0,
            360,

            gsap.getProperty(".ring","rotationY")-
            180-
            i*36

        )/360*500

    ) + "px 0px";

}

    </script>

</body>

</html>
